<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yarvis">
<meta name="theme-color" content="#000">
<link rel="manifest" href="/manifest.json">
<title>YARVIS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000;color:#e0eeff;font-family:'Share Tech Mono',monospace}

/* Fondo */
#bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 60%,#020d1a 0%,#000 70%)}
#grid{position:fixed;inset:0;z-index:0;opacity:.035;
  background-image:linear-gradient(rgba(0,212,255,.8) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.8) 1px,transparent 1px);
  background-size:60px 60px}
#particles{position:fixed;inset:0;z-index:1;pointer-events:none}

/* Layout principal */
.app{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top,0px);
  padding-bottom:env(safe-area-inset-bottom,0px)}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 8px;flex-shrink:0;border-bottom:1px solid rgba(0,212,255,.07)}
.logo{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;
  letter-spacing:.35em;color:#00d4ff;text-shadow:0 0 20px rgba(0,212,255,.4)}
.hdr-right{display:flex;align-items:center;gap:10px}
.mac-pill{font-size:9px;letter-spacing:.15em;padding:3px 8px;border-radius:20px;
  border:1px solid rgba(0,212,255,.15);color:rgba(0,212,255,.4);transition:all .4s}
.mac-pill.on{border-color:rgba(0,255,140,.4);color:rgba(0,255,140,.8)}
.engine-pill{font-size:8px;letter-spacing:.1em;padding:2px 7px;border-radius:20px;
  border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.25)}
.cfg-btn{background:none;border:1px solid rgba(0,212,255,.12);border-radius:6px;
  padding:4px 6px;cursor:pointer;color:rgba(0,212,255,.3)}
.cfg-btn svg{width:13px;height:13px;display:block}

/* Panel de ejecución (estilo Cowork) */
#taskPanel{display:none;flex-shrink:0;margin:8px 12px 0;
  background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.12);
  border-radius:10px;overflow:hidden;max-height:160px}
#taskPanel.active{display:block}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;border-bottom:1px solid rgba(0,212,255,.07)}
.panel-title{font-size:9px;letter-spacing:.2em;color:rgba(0,212,255,.5)}
.panel-status{font-size:9px;color:rgba(0,212,255,.35);display:flex;align-items:center;gap:5px}
.spin{width:6px;height:6px;border-radius:50%;border:1px solid rgba(0,212,255,.4);
  border-top-color:#00d4ff;animation:spin .8s linear infinite}
#taskSteps{list-style:none;padding:6px 12px 8px;overflow-y:auto;max-height:110px}
#taskSteps li{font-size:11px;color:rgba(0,212,255,.5);padding:2px 0;
  display:flex;align-items:center;gap:7px;line-height:1.4}
#taskSteps li.done{color:rgba(0,255,140,.6)}
#taskSteps li.done::before{content:'✓';color:#00ff8c}
#taskSteps li.active{color:#00d4ff}
#taskSteps li.active::before{content:'▸';color:#00d4ff}
#taskSteps li.err{color:rgba(255,100,100,.6)}
#taskSteps li.err::before{content:'✗';color:#ff6464}
#taskSteps li:not(.done):not(.active):not(.err)::before{content:'·';color:rgba(0,212,255,.25)}

/* Orb */
.orb-section{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;min-height:0}

.orb-wrap{position:relative;width:220px;height:220px;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.ring{position:absolute;border-radius:50%}
.r1{inset:0;border:1px solid rgba(0,212,255,.08);border-top-color:rgba(0,212,255,.3);animation:sp 18s linear infinite}
.r2{inset:18px;border:1px dashed rgba(0,100,200,.07);border-right-color:rgba(0,150,255,.2);animation:sp 11s linear infinite reverse}
.r3{inset:36px;border:1px solid rgba(0,212,255,.05);border-bottom-color:rgba(0,255,160,.12);animation:sp 26s linear infinite}
.r4{inset:54px;border:1px dashed rgba(0,212,255,.03);border-left-color:rgba(0,212,255,.1);animation:sp 8s linear infinite reverse}
.r1::before,.r1::after{content:'';position:absolute;width:4px;height:4px;border-radius:50%;
  background:rgba(0,212,255,.45);top:-2px;left:calc(50% - 2px)}
.r1::after{top:auto;bottom:-2px;background:rgba(0,212,255,.2)}

.orb-wrap.on  .r1{border-top-color:#00d4ff;box-shadow:0 0 20px rgba(0,212,255,.1)}
.orb-wrap.cmd .r1{border-top-color:#00ffaa;box-shadow:0 0 20px rgba(0,255,170,.15);animation-duration:6s}
.orb-wrap.pro .r4{border-left-color:#ffaa00;animation-duration:1.5s}
.orb-wrap.spe .r1{border-top-color:#bb88ff;box-shadow:0 0 25px rgba(187,136,255,.15);animation-duration:5s}
.orb-wrap.task .r1{border-top-color:#ffcc00;box-shadow:0 0 25px rgba(255,204,0,.15);animation-duration:3s}
.orb-wrap.task .r3{animation-duration:8s}

.orb-core{position:relative;width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle,#061018 35%,#020608 100%);
  border:1.5px solid rgba(0,212,255,.15);overflow:hidden;transition:all .4s}
.orb-wrap.on   .orb-core{border-color:rgba(0,212,255,.6);box-shadow:0 0 40px rgba(0,212,255,.2),inset 0 0 25px rgba(0,212,255,.05)}
.orb-wrap.cmd  .orb-core{border-color:rgba(0,255,170,.6);box-shadow:0 0 40px rgba(0,255,170,.2)}
.orb-wrap.pro  .orb-core{border-color:rgba(100,160,255,.5);box-shadow:0 0 25px rgba(100,160,255,.15)}
.orb-wrap.spe  .orb-core{border-color:rgba(187,136,255,.65);box-shadow:0 0 50px rgba(187,136,255,.25)}
.orb-wrap.task .orb-core{border-color:rgba(255,204,0,.55);box-shadow:0 0 40px rgba(255,204,0,.2)}

#wc{position:absolute;inset:0;width:100%;height:100%}
.pulse{position:absolute;inset:0;border-radius:50%;opacity:0;pointer-events:none}
.orb-wrap.on  .pulse{animation:glw 2.5s ease-in-out infinite;background:radial-gradient(circle,rgba(0,212,255,.08) 0%,transparent 70%)}
.orb-wrap.spe .pulse{animation:glw .75s ease-in-out infinite;background:radial-gradient(circle,rgba(187,136,255,.12) 0%,transparent 70%)}
.orb-wrap.task .pulse{animation:glw 1.5s ease-in-out infinite;background:radial-gradient(circle,rgba(255,204,0,.1) 0%,transparent 70%)}

/* Estado debajo del orb */
.state-lbl{font-size:9px;letter-spacing:.2em;color:rgba(0,212,255,.25);
  text-transform:uppercase;text-align:center}
.state-lbl.on{color:rgba(0,212,255,.55)}
.state-lbl.cmd{color:rgba(0,255,170,.6)}
.state-lbl.task{color:rgba(255,204,0,.6)}
.state-lbl.spe{color:rgba(187,136,255,.6)}

/* Puntos */
.dots{display:flex;gap:8px}
.d{width:4px;height:4px;border-radius:50%;background:rgba(0,212,255,.1);transition:all .3s}
.d.on{background:rgba(0,212,255,.8);box-shadow:0 0 5px rgba(0,212,255,.4)}
.d.blink{animation:bl 1s ease-in-out infinite}
.d.lg{width:5px;height:5px}

/* Bottom */
.bottom{flex-shrink:0;padding:8px 14px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));
  border-top:1px solid rgba(0,212,255,.06)}
.input-row{display:flex;gap:8px;align-items:center}
.txt-in{flex:1;background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.1);
  border-radius:6px;padding:9px 13px;color:#e0eeff;font-size:12px;
  font-family:'Share Tech Mono',monospace;outline:none;-webkit-appearance:none;transition:border-color .2s}
.txt-in::placeholder{color:rgba(0,212,255,.2)}
.txt-in:focus{border-color:rgba(0,212,255,.35)}
.send-btn{width:36px;height:36px;border-radius:6px;background:rgba(0,212,255,.08);
  border:1px solid rgba(0,212,255,.2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn svg{width:14px;height:14px;color:#00d4ff}

/* Config overlay */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);
  z-index:100;flex-direction:column;justify-content:flex-end}
.ov.open{display:flex}
.sheet{padding:26px 18px;padding-bottom:calc(26px + env(safe-area-inset-bottom,0px));
  border-top:1px solid rgba(0,212,255,.12);position:relative}
.sh-title{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:.35em;
  color:rgba(0,212,255,.55);margin-bottom:20px;text-align:center}
.field{margin-bottom:12px}
.lbl{font-size:8px;color:rgba(0,212,255,.3);letter-spacing:.18em;margin-bottom:5px}
.inp{width:100%;background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.1);
  border-radius:4px;padding:10px 12px;color:#e0eeff;font-size:12px;
  font-family:'Share Tech Mono',monospace;outline:none;-webkit-appearance:none}
.inp:focus{border-color:rgba(0,212,255,.35)}
.inp::placeholder{color:rgba(0,212,255,.15)}
.btn-save{width:100%;padding:12px;background:rgba(0,212,255,.08);
  border:1px solid rgba(0,212,255,.25);color:rgba(0,212,255,.85);
  font-family:'Orbitron',monospace;font-size:9px;letter-spacing:.2em;
  cursor:pointer;margin-top:10px;border-radius:4px}
.x-btn{position:absolute;top:14px;right:16px;background:none;
  border:1px solid rgba(0,212,255,.15);color:rgba(0,212,255,.3);
  width:26px;height:26px;cursor:pointer;font-size:12px;border-radius:4px;
  display:flex;align-items:center;justify-content:center}

@keyframes sp{to{transform:rotate(360deg)}}
@keyframes glw{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
@keyframes bl{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="bg"></div><div id="grid"></div>
<canvas id="particles"></canvas>

<div class="app">
  <!-- Header -->
  <div class="hdr">
    <div class="logo">YARVIS</div>
    <div class="hdr-right">
      <span class="mac-pill" id="macPill">Mac offline</span>
      <span class="engine-pill" id="enginePill">auto</span>
      <button class="cfg-btn" onclick="openCfg()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Panel de ejecución (aparece cuando Yarvis ejecuta algo) -->
  <div id="taskPanel">
    <div class="panel-hdr">
      <span class="panel-title" id="panelTitle">// Ejecutando</span>
      <span class="panel-status">
        <div class="spin" id="panelSpin"></div>
        <span id="panelStatus">en proceso</span>
      </span>
    </div>
    <ul id="taskSteps"></ul>
  </div>

  <!-- Orb central -->
  <div class="orb-section">
    <div class="orb-wrap" id="orb" onclick="orbClick()">
      <div class="ring r1"></div><div class="ring r2"></div>
      <div class="ring r3"></div><div class="ring r4"></div>
      <div class="orb-core">
        <canvas id="wc"></canvas>
        <div class="pulse"></div>
      </div>
    </div>
    <div class="state-lbl" id="stateLbl">Di "Yarvis" para activar</div>
    <div class="dots">
      <div class="d" id="d1"></div>
      <div class="d lg" id="d2"></div>
      <div class="d" id="d3"></div>
    </div>
  </div>

  <!-- Input -->
  <div class="bottom">
    <div class="input-row">
      <input class="txt-in" id="txtIn" type="text" placeholder="O escribe aquí..."
             enterkeyhint="send" onkeydown="if(event.key==='Enter')sendText()">
      <button class="send-btn" onclick="sendText()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Config -->
<div class="ov" id="ov">
  <div class="sheet">
    <button class="x-btn" onclick="closeOv()">✕</button>
    <div class="sh-title">// SYSTEM CONFIGURATION</div>
    <div class="field"><div class="lbl">RAILWAY SERVER URL</div>
      <input class="inp" id="cfgUrl" type="url" placeholder="https://xxx.up.railway.app"></div>
    <div class="field"><div class="lbl">ACCESS KEY</div>
      <input class="inp" id="cfgSecret" type="password" placeholder="••••••••••"></div>
    <button class="btn-save" onclick="saveCfg()">// INITIALIZE SYSTEM</button>
  </div>
</div>

<script>
const SID='y-'+(localStorage.getItem('ysid')||(() => {const s=Math.random().toString(36).slice(2,8);localStorage.setItem('ysid',s);return s;})());
let url    = localStorage.getItem('yurl')||'';
let secret = localStorage.getItem('ysec')||'';
let convOn = false, busy = false, recRunning = false;
let cmdTimer = null;
const WAKE  = ['yarvis','jarvis','yarbi','jarbi'];
const CLOSE = ['chao yarvis','adiós yarvis','adios yarvis','hasta luego yarvis'];

// ── Partículas ────────────────────────────────────────────────────────────────
const pc=document.getElementById('particles'),px=pc.getContext('2d');
let pts=[];
function initPts(){pc.width=innerWidth;pc.height=innerHeight;
  pts=Array.from({length:50},()=>({x:Math.random()*pc.width,y:Math.random()*pc.height,
    r:Math.random()*.7+.2,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,a:Math.random()*.28+.04}));}
function drawPts(){px.clearRect(0,0,pc.width,pc.height);
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=pc.width;if(p.x>pc.width)p.x=0;
    if(p.y<0)p.y=pc.height;if(p.y>pc.height)p.y=0;
    px.beginPath();px.arc(p.x,p.y,p.r,0,Math.PI*2);
    px.fillStyle=`rgba(0,212,255,${p.a})`;px.fill();});
  requestAnimationFrame(drawPts);}
window.addEventListener('resize',initPts);initPts();drawPts();

// ── Waveform ──────────────────────────────────────────────────────────────────
const wc=document.getElementById('wc'),wctx=wc.getContext('2d');
let waf,analyser,darr,actx;
function resizeWC(){const c=document.querySelector('.orb-core');wc.width=c.offsetWidth;wc.height=c.offsetHeight;}
function drawIdle(){resizeWC();const W=wc.width,H=wc.height,t=Date.now()/1000;
  wctx.clearRect(0,0,W,H);
  [7,13,20].forEach((r,i)=>{const p=Math.sin(t*.9+i)*1.2;
    wctx.strokeStyle=`rgba(0,212,255,${.04+i*.015})`;wctx.lineWidth=.8;
    wctx.beginPath();wctx.arc(W/2,H/2,r+p,0,Math.PI*2);wctx.stroke();});
  waf=requestAnimationFrame(drawIdle);}
function drawWave(col){if(!analyser)return;analyser.getByteTimeDomainData(darr);
  resizeWC();const W=wc.width,H=wc.height;wctx.clearRect(0,0,W,H);
  wctx.strokeStyle=col;wctx.lineWidth=1.5;wctx.beginPath();
  const sw=W/darr.length;let x=0;
  for(let i=0;i<darr.length;i++){const y=(darr[i]/128)*(H/2);
    i===0?wctx.moveTo(x,y):wctx.lineTo(x,y);x+=sw;}
  wctx.lineTo(W,H/2);wctx.stroke();waf=requestAnimationFrame(()=>drawWave(col));}
async function initAudio(){if(actx)return;
  try{const s=await navigator.mediaDevices.getUserMedia({audio:true});
    actx=new AudioContext();analyser=actx.createAnalyser();analyser.fftSize=256;
    darr=new Uint8Array(analyser.frequencyBinCount);
    actx.createMediaStreamSource(s).connect(analyser);}catch(e){}}

// ── Panel de ejecución ────────────────────────────────────────────────────────
let panelSteps = [];

function showPanel(title){
  panelSteps = [];
  document.getElementById('taskPanel').classList.add('active');
  document.getElementById('panelTitle').textContent = '// ' + title;
  document.getElementById('panelStatus').textContent = 'en proceso';
  document.getElementById('panelSpin').style.display = 'block';
  document.getElementById('taskSteps').innerHTML = '';
}

function addStep(text, status='active'){
  // Marcar el paso anterior como hecho
  const ul = document.getElementById('taskSteps');
  const prev = ul.querySelector('li.active');
  if(prev) prev.className = 'done';

  const li = document.createElement('li');
  li.className = status;
  li.textContent = text;
  ul.appendChild(li);
  ul.scrollTop = ul.scrollHeight;
  panelSteps.push({text, status});
}

function finishPanel(ok=true){
  const ul = document.getElementById('taskSteps');
  const active = ul.querySelector('li.active');
  if(active) active.className = ok ? 'done' : 'err';
  document.getElementById('panelStatus').textContent = ok ? 'completado' : 'error';
  document.getElementById('panelSpin').style.display = 'none';
  // Ocultar panel tras 4 segundos
  setTimeout(()=>{
    document.getElementById('taskPanel').classList.remove('active');
  }, 4000);
}

function hidePanel(){
  document.getElementById('taskPanel').classList.remove('active');
}

// ── Estado del orb ────────────────────────────────────────────────────────────
const STATES = {
  '':    {lbl:'Di "Yarvis" para activar', cls:''},
  on:    {lbl:'Escuchando — di "Yarvis"', cls:'on'},
  cmd:   {lbl:'Escuchando orden...', cls:'cmd'},
  pro:   {lbl:'Procesando...', cls:'pro'},
  spe:   {lbl:'Respondiendo...', cls:'spe'},
  task:  {lbl:'Ejecutando tarea...', cls:'task'},
};

function setOrb(s){
  const st = STATES[s]||STATES[''];
  document.getElementById('orb').className='orb-wrap '+(st.cls||'');
  const lbl=document.getElementById('stateLbl');
  lbl.textContent=st.lbl; lbl.className='state-lbl '+(st.cls||'');
  const [d1,d2,d3]=[document.getElementById('d1'),document.getElementById('d2'),document.getElementById('d3')];
  [d1,d2,d3].forEach(d=>d.className=d.id==='d2'?'d lg':'d');
  if(s==='on'){d2.classList.add('on','blink');}
  else if(s==='cmd'){d1.classList.add('on');d2.classList.add('on','blink');}
  else if(s==='pro'||s==='task'){d1.classList.add('on');d2.classList.add('on');d3.classList.add('on','blink');}
  else if(s==='spe'){d1.classList.add('on');d2.classList.add('on');d3.classList.add('on');}
  cancelAnimationFrame(waf);
  if(s==='on')drawWave('rgba(0,212,255,.55)');
  else if(s==='cmd')drawWave('rgba(0,255,170,.6)');
  else if(s==='spe')drawWave('rgba(187,136,255,.7)');
  else if(s==='task')drawWave('rgba(255,204,0,.55)');
  else drawIdle();
}

// ── TTS / Audio ───────────────────────────────────────────────────────────────
function speakFallback(text){
  return new Promise(res=>{
    if(!window.speechSynthesis){res();return;}
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text.slice(0,400));
    const vs=speechSynthesis.getVoices();
    const pref=[v=>v.lang==='es-ES'&&/jorge|pablo|diego/i.test(v.name),
      v=>v.lang.startsWith('es')&&!/lucia|female/i.test(v.name),
      v=>/daniel/i.test(v.name)&&v.lang==='en-GB',v=>v.lang==='en-GB'];
    for(const fn of pref){const v=vs.find(fn);if(v){u.voice=v;break;}}
    u.lang='es-ES';u.pitch=0.72;u.rate=0.88;u.volume=1;
    u.onend=res;u.onerror=res;speechSynthesis.speak(u);setTimeout(res,20000);});}

function playB64(b64){
  return new Promise(res=>{
    try{const bytes=atob(b64),buf=new Uint8Array(bytes.length);
      for(let i=0;i<bytes.length;i++)buf[i]=bytes.charCodeAt(i);
      const blob=new Blob([buf],{type:'audio/mpeg'});
      const burl=URL.createObjectURL(blob);
      const audio=new Audio(burl);
      audio.onended=()=>{URL.revokeObjectURL(burl);res();};
      audio.onerror=()=>{URL.revokeObjectURL(burl);res();};
      audio.play().catch(()=>{URL.revokeObjectURL(burl);res();});
    }catch(e){res();}});}

async function speak(text,b64){
  setOrb('spe');
  if(b64)await playB64(b64);
  else await speakFallback(text);
  setOrb(convOn?'on':'');}

// ── API ───────────────────────────────────────────────────────────────────────
async function sendMessage(text){
  if(!url){openCfg();return;}
  if(busy)return;
  busy=true;
  setOrb('pro');

  try{
    const res=await fetch(url.replace(/\/$/,'')+'/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text,session_id:SID,secret})});

    if(!res.ok){
      const err=await res.json().catch(()=>({reply:'Error de servidor'}));
      if(res.status===401){openCfg();busy=false;return;}
      hidePanel();
      await speak(err.reply||'Error de servidor.',null);
      busy=false;setOrb(convOn?'on':'');return;
    }

    const data=await res.json();

    // Actualizar UI
    document.getElementById('enginePill').textContent=data.engine||'auto';
    updateMac(data.mac_online);

    // ── Panel de ejecución: mostrar siempre que haya acciones ──
    const steps = data.exec_steps || [];
    const acts  = data.actions    || [];

    if(steps.length > 0 || acts.length > 0){
      // Título: primera acción o el texto del usuario
      const firstAct = acts[0];
      const title = firstAct
        ? `${firstAct.type.toUpperCase()}: ${firstAct.value.slice(0,35)}`
        : text.slice(0,40);
      showPanel(title);

      if(steps.length > 0){
        // Tenemos resultados reales del servidor
        steps.forEach((s,i)=>{
          setTimeout(()=>{
            const a = s.action;
            const icons={app:'App',url:'URL',cmd:'CMD',key:'Key',
              type:'Escribir',typewrite:'Escribir',click:'Click',
              screenshot:'Captura',vision:'Visión',spotlight:'Buscar',
              file_org:'Organizar',file_find:'Buscar archivos',
              file_move:'Mover',file_rename:'Renombrar',
              file_new:'Crear carpeta',file_list:'Listar'};
            const label = `${icons[a.type]||a.type}: ${a.value.slice(0,30)}`;
            // Determinar estado
            const status = s.ok ? 'done' : 'err';
            const li = document.createElement('li');
            li.className = status;
            li.textContent = label;
            if(!s.ok && s.result && s.result !== 'Mac no conectado'){
              li.textContent += ` — ${s.result.slice(0,40)}`;
            }
            document.getElementById('taskSteps').appendChild(li);
            document.getElementById('taskSteps').scrollTop = 999;
          }, i * 150);
        });
        setTimeout(()=>finishPanel(steps.every(s=>s.ok)), steps.length*150+200);
      } else if(acts.length > 0 && !data.mac_online){
        // Mac no conectado — mostrar acciones que no pudieron ejecutarse
        acts.forEach(a=>{
          const li=document.createElement('li');
          li.className='err';
          li.textContent=`${a.type}: ${a.value.slice(0,35)} — Mac offline`;
          document.getElementById('taskSteps').appendChild(li);
        });
        setTimeout(()=>finishPanel(false),500);
      } else {
        // Acciones sin resultado confirmado
        acts.forEach((a,i)=>{
          setTimeout(()=>{
            const li=document.createElement('li');
            li.className='done';
            li.textContent=`${a.type}: ${a.value.slice(0,35)}`;
            document.getElementById('taskSteps').appendChild(li);
          },i*150);
        });
        setTimeout(()=>finishPanel(true),acts.length*150+200);
      }
    }

    await speak(data.reply, data.audio_b64||null);

  }catch(e){
    hidePanel();
    await speak('No puedo conectar con el servidor.',null);
  }finally{
    busy=false;
    setOrb(convOn?'on':'');
  }
}

function sendText(){
  const inp=document.getElementById('txtIn');
  const t=inp.value.trim();
  if(!t||busy)return;
  inp.value='';
  sendMessage(t);
}

// ── Speech Recognition ────────────────────────────────────────────────────────
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=null;

function startRec(){
  if(!SR||!url||recRunning)return;
  rec=new SR();rec.lang='es-ES';rec.continuous=true;rec.interimResults=true;
  rec.onstart=()=>{recRunning=true;initAudio();setOrb(convOn?'on':'on');};
  rec.onresult=e=>{
    if(busy)return;
    let fin='',int='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      e.results[i].isFinal?fin+=t:int+=t;}
    if(!fin)return;
    const txt=fin.toLowerCase().trim();
    if(!convOn){
      if(WAKE.some(w=>txt.includes(w))){
        convOn=true;setOrb('on');
        let cmd=txt;WAKE.forEach(w=>{cmd=cmd.replace(new RegExp(w,'gi'),'').trim();});
        cmd=cmd.replace(/^[\s,.\-]+/,'').trim();
        if(cmd.length>2)sendMessage(cmd);
        else speak('Dime.',null);
      }
    }else{
      if(CLOSE.some(w=>txt.includes(w))){
        convOn=false;setOrb('');speak('Hasta pronto.',null);return;}
      let clean=txt;WAKE.forEach(w=>{clean=clean.replace(new RegExp('^'+w+'[\\s,.\-]*','gi'),'').trim();});
      if(clean.length>1&&!busy){
        cmdTimer&&clearTimeout(cmdTimer);
        const cap=clean;
        cmdTimer=setTimeout(()=>{if(!busy&&convOn)sendMessage(cap);},900);}
    }};
  rec.onerror=e=>{
    recRunning=false;
    if(e.error==='not-allowed'){setOrb('');return;}
    if(convOn||!convOn)setTimeout(startRec,800);};
  rec.onend=()=>{recRunning=false;setTimeout(startRec,200);};
  try{rec.start();}catch(e){recRunning=false;setTimeout(startRec,500);}
}

function orbClick(){
  if(!url){openCfg();return;}
  if(convOn){convOn=false;setOrb('');speak('Hasta pronto.',null);}
  else{convOn=true;setOrb('on');speak('Dime.',null);}
}

// ── Mac / status ──────────────────────────────────────────────────────────────
function updateMac(on){
  const p=document.getElementById('macPill');
  p.textContent=on?'Mac online':'Mac offline';
  p.className='mac-pill'+(on?' on':'');
}

async function checkStatus(){
  if(!url)return;
  try{const r=await fetch(url.replace(/\/$/,'')+'/api/status');
    if(r.ok){const d=await r.json();updateMac(d.mac_online);
      if(d.engine)document.getElementById('enginePill').textContent=d.engine;}}catch(e){}}

// ── Config ────────────────────────────────────────────────────────────────────
function openCfg(){document.getElementById('cfgUrl').value=url;document.getElementById('cfgSecret').value=secret;document.getElementById('ov').classList.add('open');}
function closeOv(){document.getElementById('ov').classList.remove('open');}
function saveCfg(){
  url=document.getElementById('cfgUrl').value.trim();
  secret=document.getElementById('cfgSecret').value.trim();
  localStorage.setItem('yurl',url);localStorage.setItem('ysec',secret);
  closeOv();checkStatus();
  setTimeout(()=>speak('Sistema configurado.',null).then(()=>startRec()),300);}
document.getElementById('ov').addEventListener('click',e=>{if(e.target===document.getElementById('ov'))closeOv();});

// ── Init ──────────────────────────────────────────────────────────────────────
if(window.speechSynthesis){speechSynthesis.getVoices();
  speechSynthesis.addEventListener('voiceschanged',()=>{},{once:true});}
resizeWC();drawIdle();
if(!url)setTimeout(openCfg,600);
else{checkStatus();startRec();}
setInterval(checkStatus,30000);
</script>
