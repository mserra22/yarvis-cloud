<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yarvis">
<meta name="theme-color" content="#090c12">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon.png">
<title>Yarvis</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#090c12;--bg2:#0e1420;--bg3:#141c2e;
  --accent:#00e5c8;--accent2:#0085ff;
  --text:#e2eaff;--muted:#4a5680;
  --danger:#ff4d6a;--warn:#f59e0b;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif}

/* Layout */
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;padding:0}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 10px;flex-shrink:0;
  padding-top:calc(14px + env(safe-area-inset-top,0px))}
.logo{font-size:18px;font-weight:700;letter-spacing:.2em;color:var(--accent)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .4s}
.status-dot.on{background:var(--accent)}
.status-dot.processing{background:var(--accent2);animation:blink .6s infinite}
.mac-badge{font-size:10px;letter-spacing:.1em;color:var(--muted);display:flex;align-items:center;gap:5px}
.mac-badge.online{color:var(--accent)}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:8px 16px;display:flex;flex-direction:column;
  gap:10px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px}

.msg{display:flex;flex-direction:column;gap:3px;max-width:88%;animation:fadeUp .25s ease}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.bot{align-self:flex-start;align-items:flex-start}
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;
  word-break:break-word}
.msg.user .bubble{background:var(--accent2);color:#fff;border-bottom-right-radius:4px}
.msg.bot  .bubble{background:var(--bg2);color:var(--text);border-bottom-left-radius:4px;
  border:1px solid rgba(0,229,200,.08)}
.action-tag{font-size:11px;color:var(--warn);padding:3px 8px;background:rgba(245,158,11,.08);
  border-radius:8px;margin-top:3px;align-self:flex-start}

/* Thinking dots */
.thinking .bubble{display:flex;gap:5px;align-items:center;padding:12px 16px}
.thinking .bubble span{width:6px;height:6px;border-radius:50%;background:var(--accent);
  animation:bounce .9s ease-in-out infinite}
.thinking .bubble span:nth-child(2){animation-delay:.15s}
.thinking .bubble span:nth-child(3){animation-delay:.3s}

/* Bottom area */
.bottom{flex-shrink:0;padding:8px 16px;
  padding-bottom:calc(8px + var(--safe-bottom));
  background:var(--bg);border-top:1px solid rgba(255,255,255,.04)}

/* Mic button */
.mic-row{display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:10px}
.mic-btn{width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;
  background:var(--bg3);border:1.5px solid rgba(0,229,200,.25);
  display:flex;align-items:center;justify-content:center;transition:all .2s;
  outline:none;position:relative;overflow:hidden;flex-shrink:0}
.mic-btn:active,.mic-btn.recording{background:rgba(0,229,200,.12);
  border-color:var(--accent);transform:scale(1.05)}
.mic-btn.recording{animation:micPulse 1.2s ease-in-out infinite}
.mic-btn svg{width:28px;height:28px;color:var(--accent);transition:color .2s}
.mic-btn.recording svg{color:var(--accent)}

/* State label */
.state-lbl{font-size:12px;color:var(--muted);text-align:center;
  letter-spacing:.08em;min-height:18px;transition:color .3s}
.state-lbl.active{color:var(--accent)}

/* Text input */
.input-row{display:flex;gap:8px;align-items:center}
.txt-in{flex:1;background:var(--bg3);border:1px solid rgba(0,229,200,.1);
  border-radius:22px;padding:10px 16px;color:var(--text);font-size:15px;
  outline:none;-webkit-appearance:none;transition:border-color .2s}
.txt-in::placeholder{color:var(--muted)}
.txt-in:focus{border-color:rgba(0,229,200,.3)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity .2s}
.send-btn:active{opacity:.7}
.send-btn svg{width:18px;height:18px}

/* Config panel */
.cfg-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);
  border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.cfg-btn:active{background:var(--bg2)}
.cfg-btn svg{width:16px;height:16px;color:var(--muted)}

.cfg-overlay{display:none;position:fixed;inset:0;background:rgba(9,12,18,.9);
  z-index:100;flex-direction:column;justify-content:flex-end}
.cfg-overlay.open{display:flex}
.cfg-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:24px 20px;
  padding-bottom:calc(24px + var(--safe-bottom));border-top:1px solid rgba(0,229,200,.1)}
.cfg-title{font-size:14px;font-weight:600;letter-spacing:.1em;color:var(--accent);
  margin-bottom:16px;text-align:center}
.cfg-field{margin-bottom:12px}
.cfg-label{font-size:11px;color:var(--muted);letter-spacing:.12em;margin-bottom:5px}
.cfg-input{width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;
  font-family:monospace;outline:none;-webkit-appearance:none}
.cfg-input:focus{border-color:rgba(0,229,200,.3)}
.cfg-save{width:100%;padding:13px;border-radius:12px;background:var(--accent);
  border:none;color:#090c12;font-size:15px;font-weight:600;cursor:pointer;
  margin-top:8px;letter-spacing:.05em}
.cfg-close{position:absolute;top:20px;right:20px;width:30px;height:30px;
  border-radius:50%;background:var(--bg3);border:none;color:var(--muted);
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,229,200,.3)}60%{box-shadow:0 0 0 14px rgba(0,229,200,0)}}
</style>
</head>
<body>

<div class="app">
  <div class="hdr">
    <div class="logo">YARVIS</div>
    <div class="mac-badge" id="macBadge">
      <div class="status-dot" id="statusDot"></div>
      <span id="macLabel">Mac desconectado</span>
    </div>
    <button class="cfg-btn" onclick="openCfg()" aria-label="Configuración">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="msgs" id="msgs">
    <div class="msg bot">
      <div class="bubble">Hola, soy Yarvis. Pulsa el micrófono o escribe para hablar conmigo.</div>
    </div>
  </div>

  <div class="bottom">
    <div class="mic-row">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" aria-label="Micrófono">
        <svg id="micIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10c0 3.866 3.134 7 7 7s7-3.134 7-7" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke-linecap="round"/>
          <line x1="8" y1="21" x2="16" y2="21" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="state-lbl" id="stateLbl">Toca para hablar</div>
    <div style="height:8px"></div>
    <div class="input-row">
      <input class="txt-in" id="txtIn" type="text" placeholder="O escribe aquí…"
             enterkeyhint="send" onkeydown="if(event.key==='Enter')sendText()">
      <button class="send-btn" onclick="sendText()" aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Config overlay -->
<div class="cfg-overlay" id="cfgOverlay">
  <div class="cfg-sheet" style="position:relative">
    <button class="cfg-close" onclick="closeCfg()">✕</button>
    <div class="cfg-title">CONFIGURACIÓN</div>
    <div class="cfg-field">
      <div class="cfg-label">URL DEL SERVIDOR</div>
      <input class="cfg-input" id="cfgUrl" type="url"
             placeholder="https://tu-app.up.railway.app">
    </div>
    <div class="cfg-field">
      <div class="cfg-label">CLAVE SECRETA</div>
      <input class="cfg-input" id="cfgSecret" type="password"
             placeholder="tu-clave-secreta">
    </div>
    <button class="cfg-save" onclick="saveConfig()">Guardar y conectar</button>
  </div>
</div>

<script>
const SESSION = 'yarvis-' + Math.random().toString(36).slice(2,8);
let serverUrl = localStorage.getItem('yarvis_url') || '';
let secret    = localStorage.getItem('yarvis_secret') || '';
let isRecording = false;
let recognition = null;
let processing  = false;
let macOnline   = false;

// ── Speech Recognition ────────────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function toggleMic() {
  if (!SR) { addMsg('bot','Tu navegador no soporta reconocimiento de voz. Usa el campo de texto.'); return; }
  if (!serverUrl) { openCfg(); return; }
  if (isRecording) stopRec();
  else startRec();
}

function startRec() {
  recognition = new SR();
  recognition.lang = 'es-ES';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    setStateLbl('Escuchando…', true);
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript.trim();
    if (text) sendMessage(text);
  };

  recognition.onerror = (e) => {
    stopRec();
    if (e.error === 'no-speech') setStateLbl('No escuché nada, inténtalo de nuevo');
    else if (e.error === 'not-allowed') setStateLbl('Permiso de micrófono denegado');
    else setStateLbl('Error de micrófono');
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    if (!processing) setStateLbl('Toca para hablar');
  };

  recognition.start();
}

function stopRec() {
  recognition && recognition.stop();
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendText() {
  const inp = document.getElementById('txtIn');
  const t = inp.value.trim();
  if (!t || processing) return;
  inp.value = '';
  sendMessage(t);
}

async function sendMessage(text) {
  if (!serverUrl) { openCfg(); return; }
  if (processing) return;
  processing = true;
  addMsg('user', text);
  setStateLbl('Procesando…', true);
  setDot('processing');

  const thinkId = addThinking();

  try {
    const res = await fetch(serverUrl.replace(/\/$/, '') + '/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, session_id: SESSION, secret})
    });

    removeThinking(thinkId);

    if (!res.ok) {
      const err = await res.json().catch(() => ({detail: 'Error desconocido'}));
      if (res.status === 401) openCfg();
      addMsg('bot', 'Error: ' + (err.detail || res.statusText));
      return;
    }

    const data = await res.json();
    addMsg('bot', data.reply, data.actions || []);
    updateMacStatus(data.mac_online);
    speak(data.reply);

  } catch(e) {
    removeThinking(thinkId);
    addMsg('bot', 'No puedo conectar con el servidor. Comprueba la URL en configuración.');
  } finally {
    processing = false;
    setStateLbl('Toca para hablar');
    setDot(macOnline ? 'on' : '');
  }
}

// ── Speech Synthesis ──────────────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text.slice(0, 400));
  utt.lang = 'es-ES';
  utt.rate = 1.05;
  const voices = speechSynthesis.getVoices();
  const esVoice = voices.find(v => v.lang.startsWith('es'));
  if (esVoice) utt.voice = esVoice;
  speechSynthesis.speak(utt);
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function addMsg(role, text, actions=[]) {
  const div = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  if (actions.length) {
    actions.forEach(a => {
      const tag = document.createElement('div');
      tag.className = 'action-tag';
      const icons = {url:'🌐',cmd:'⚡',app:'📂'};
      tag.textContent = (icons[a.type]||'▸') + ' ' + a.value;
      wrap.appendChild(tag);
    });
  }
  div.appendChild(wrap);
  div.scrollTop = div.scrollHeight;
}

function addThinking() {
  const id = 'think-' + Date.now();
  const div = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot thinking'; wrap.id = id;
  wrap.innerHTML = '<div class="bubble"><span></span><span></span><span></span></div>';
  div.appendChild(wrap);
  div.scrollTop = div.scrollHeight;
  return id;
}

function removeThinking(id) { document.getElementById(id)?.remove(); }

function setStateLbl(t, active=false) {
  const el = document.getElementById('stateLbl');
  el.textContent = t;
  el.className = 'state-lbl' + (active ? ' active' : '');
}

function setDot(state) {
  const d = document.getElementById('statusDot');
  d.className = 'status-dot' + (state ? ' '+state : '');
}

function updateMacStatus(online) {
  macOnline = online;
  const badge = document.getElementById('macBadge');
  const label = document.getElementById('macLabel');
  badge.className = 'mac-badge' + (online ? ' online' : '');
  label.textContent = online ? 'Mac conectado' : 'Mac desconectado';
  setDot(online ? 'on' : '');
}

// ── Config ────────────────────────────────────────────────────────────────────
function openCfg() {
  document.getElementById('cfgUrl').value    = serverUrl;
  document.getElementById('cfgSecret').value = secret;
  document.getElementById('cfgOverlay').classList.add('open');
}
function closeCfg() { document.getElementById('cfgOverlay').classList.remove('open'); }

function saveConfig() {
  serverUrl = document.getElementById('cfgUrl').value.trim();
  secret    = document.getElementById('cfgSecret').value.trim();
  localStorage.setItem('yarvis_url', serverUrl);
  localStorage.setItem('yarvis_secret', secret);
  closeCfg();
  if (serverUrl) {
    addMsg('bot', '✓ Configuración guardada. Ya puedes hablar con Yarvis.');
    checkStatus();
  }
}

async function checkStatus() {
  if (!serverUrl) return;
  try {
    const r = await fetch(serverUrl.replace(/\/$/, '') + '/api/status');
    if (r.ok) {
      const d = await r.json();
      updateMacStatus(d.mac_online);
    }
  } catch(e) {}
}

// Init
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.addEventListener('voiceschanged', () => {}, {once:true});
}
if (serverUrl) checkStatus();
else setTimeout(openCfg, 800);
setInterval(checkStatus, 30000);

// Close config on backdrop click
document.getElementById('cfgOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeCfg();
});
</script>
</body>
</html>
