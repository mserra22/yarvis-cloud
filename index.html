<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yarvis">
<meta name="theme-color" content="#060910">
<link rel="manifest" href="/manifest.json">
<title>Yarvis</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060910;--bg2:#0b1018;--bg3:#111820;
  --c:#00d4ff;--c2:#0066cc;--c3:#003366;
  --text:#c8e8ff;--muted:#2a4a6a;
  --red:#ff3355;--amber:#ffaa00;
  --glow:rgba(0,212,255,0.15);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Courier New',Courier,monospace}

/* Fondo con líneas tipo HUD */
body::before{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(0,212,255,0.03) 48px),
             repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(0,212,255,0.03) 48px);
  pointer-events:none;z-index:0}

.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;
  margin:0 auto;position:relative;z-index:1}

/* Header HUD */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:calc(14px + env(safe-area-inset-top,0px)) 18px 10px;
  flex-shrink:0;border-bottom:1px solid rgba(0,212,255,0.08)}

.logo{font-size:20px;font-weight:700;letter-spacing:.3em;color:var(--c);
  text-shadow:0 0 20px rgba(0,212,255,0.5)}

.mac-badge{font-size:10px;letter-spacing:.15em;color:var(--muted);
  display:flex;align-items:center;gap:5px;text-transform:uppercase}
.mac-badge.online{color:var(--c)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.dot.online{animation:dotPulse 2s ease-in-out infinite}

.cfg-btn{background:none;border:1px solid var(--muted);border-radius:6px;
  padding:5px 7px;cursor:pointer;color:var(--muted);transition:all .2s}
.cfg-btn:active{color:var(--c);border-color:var(--c)}
.cfg-btn svg{width:14px;height:14px}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;
  gap:8px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.msgs::-webkit-scrollbar{width:2px}
.msgs::-webkit-scrollbar-thumb{background:var(--muted)}

.msg{display:flex;flex-direction:column;gap:3px;max-width:90%;animation:fadeUp .2s ease}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.bot{align-self:flex-start;align-items:flex-start}

.bubble{padding:9px 13px;font-size:13px;line-height:1.55;word-break:break-word}
.msg.user .bubble{
  background:rgba(0,102,204,0.3);color:#a0d4ff;
  border:1px solid rgba(0,102,204,0.5);border-radius:12px 12px 2px 12px}
.msg.bot .bubble{
  background:rgba(0,212,255,0.05);color:var(--text);
  border:1px solid rgba(0,212,255,0.15);border-radius:2px 12px 12px 12px}
.msg.bot .role{font-size:9px;letter-spacing:.2em;color:var(--c);
  margin-bottom:2px;text-transform:uppercase}

.action-tag{font-size:10px;color:var(--amber);padding:2px 8px;
  background:rgba(255,170,0,0.08);border:1px solid rgba(255,170,0,0.2);
  border-radius:4px;margin-top:3px;letter-spacing:.05em}

.thinking .bubble{display:flex;gap:6px;align-items:center;padding:12px 16px}
.thinking .bubble span{width:5px;height:5px;border-radius:50%;background:var(--c);
  animation:bounce .9s ease-in-out infinite}
.thinking .bubble span:nth-child(2){animation-delay:.15s}
.thinking .bubble span:nth-child(3){animation-delay:.3s}

/* Bottom */
.bottom{flex-shrink:0;padding:10px 16px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
  background:var(--bg);border-top:1px solid rgba(0,212,255,0.08)}

/* Orb central */
.orb-area{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:10px}

.orb-outer{width:90px;height:90px;border-radius:50%;
  border:1px solid rgba(0,212,255,0.15);display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all .3s;position:relative}
.orb-outer.wake{border-color:rgba(0,212,255,0.4);animation:outerPulse 3s ease-in-out infinite}
.orb-outer.cmd{border-color:rgba(255,51,85,0.5);animation:outerPulseRed 1s ease-in-out infinite}

.orb-inner{width:68px;height:68px;border-radius:50%;
  background:var(--bg2);border:1.5px solid rgba(0,212,255,0.2);
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;position:relative;overflow:hidden}
.orb-outer.wake .orb-inner{border-color:var(--c);background:rgba(0,212,255,0.06)}
.orb-outer.cmd  .orb-inner{border-color:var(--red);background:rgba(255,51,85,0.06)}

.orb-inner svg{width:26px;height:26px;color:var(--muted);transition:color .3s;z-index:1}
.orb-outer.wake .orb-inner svg{color:var(--c)}
.orb-outer.cmd  .orb-inner svg{color:var(--red)}

/* Scan line inside orb when active */
.orb-outer.wake .orb-inner::after,
.orb-outer.cmd  .orb-inner::after{
  content:'';position:absolute;left:0;right:0;height:1px;
  background:currentColor;opacity:.4;
  animation:scan 2s ease-in-out infinite}
.orb-outer.cmd .orb-inner::after{animation-duration:1s}

.state-lbl{font-size:10px;letter-spacing:.2em;color:var(--muted);
  text-transform:uppercase;text-align:center;min-height:14px;transition:color .3s}
.state-lbl.active{color:var(--c)}
.state-lbl.cmd{color:var(--red)}

/* Input */
.input-row{display:flex;gap:8px;align-items:center}
.txt-in{flex:1;background:var(--bg3);border:1px solid rgba(0,212,255,0.12);
  border-radius:6px;padding:9px 14px;color:var(--text);font-size:13px;
  font-family:'Courier New',monospace;outline:none;-webkit-appearance:none;
  transition:border-color .2s}
.txt-in::placeholder{color:var(--muted)}
.txt-in:focus{border-color:rgba(0,212,255,0.35)}
.send-btn{width:38px;height:38px;border-radius:6px;
  background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s}
.send-btn:active{background:rgba(0,212,255,0.2)}
.send-btn svg{width:16px;height:16px;color:var(--c)}

/* Config sheet */
.cfg-overlay{display:none;position:fixed;inset:0;background:rgba(6,9,16,.95);
  z-index:100;flex-direction:column;justify-content:flex-end}
.cfg-overlay.open{display:flex}
.cfg-sheet{background:var(--bg2);border-top:1px solid rgba(0,212,255,0.2);
  padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));
  position:relative}
.cfg-title{font-size:11px;font-weight:700;letter-spacing:.25em;color:var(--c);
  margin-bottom:18px;text-align:center;text-transform:uppercase}
.cfg-field{margin-bottom:12px}
.cfg-label{font-size:10px;color:var(--muted);letter-spacing:.15em;
  margin-bottom:5px;text-transform:uppercase}
.cfg-input{width:100%;background:var(--bg3);border:1px solid rgba(0,212,255,0.1);
  border-radius:6px;padding:10px 12px;color:var(--text);font-size:13px;
  font-family:'Courier New',monospace;outline:none;-webkit-appearance:none}
.cfg-input:focus{border-color:rgba(0,212,255,0.35)}
.cfg-save{width:100%;padding:12px;border-radius:6px;
  background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.4);
  color:var(--c);font-size:13px;font-weight:700;font-family:'Courier New',monospace;
  letter-spacing:.15em;cursor:pointer;margin-top:8px;text-transform:uppercase;
  transition:all .2s}
.cfg-save:active{background:rgba(0,212,255,0.2)}
.cfg-close{position:absolute;top:14px;right:14px;background:none;
  border:1px solid var(--muted);color:var(--muted);width:26px;height:26px;
  border-radius:4px;cursor:pointer;font-size:12px;display:flex;
  align-items:center;justify-content:center}

@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{opacity:.2;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes outerPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,0)}50%{box-shadow:0 0 0 8px rgba(0,212,255,0.06)}}
@keyframes outerPulseRed{0%,100%{box-shadow:0 0 0 0 rgba(255,51,85,0)}50%{box-shadow:0 0 0 10px rgba(255,51,85,0.08)}}
@keyframes scan{0%{top:-2px;opacity:0}10%{opacity:.5}90%{opacity:.3}100%{top:100%;opacity:0}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">YARVIS</div>
    <div class="mac-badge" id="macBadge">
      <div class="dot" id="macDot"></div>
      <span id="macLabel">Mac offline</span>
    </div>
    <button class="cfg-btn" onclick="openCfg()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>

  <div class="msgs" id="msgs">
    <div class="msg bot">
      <div class="role">Yarvis</div>
      <div class="bubble">Sistema en línea. Di <strong style="color:var(--c)">"Yarvis"</strong> para activarme, o introduce texto manualmente.</div>
    </div>
  </div>

  <div class="bottom">
    <div class="orb-area">
      <div class="orb-outer" id="orb" onclick="orbClick()">
        <div class="orb-inner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10c0 3.866 3.134 7 7 7s7-3.134 7-7" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12" y2="21" stroke-linecap="round"/>
            <line x1="8" y1="21" x2="16" y2="21" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="state-lbl" id="stateLbl">Toca para activar</div>
    </div>
    <div class="input-row">
      <input class="txt-in" id="txtIn" type="text" placeholder="Introduce comando…"
             enterkeyhint="send" onkeydown="if(event.key==='Enter')sendText()">
      <button class="send-btn" onclick="sendText()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="cfg-overlay" id="cfgOverlay">
  <div class="cfg-sheet">
    <button class="cfg-close" onclick="closeCfg()">✕</button>
    <div class="cfg-title">// Configuración del sistema</div>
    <div class="cfg-field">
      <div class="cfg-label">URL servidor Railway</div>
      <input class="cfg-input" id="cfgUrl" type="url" placeholder="https://xxx.up.railway.app">
    </div>
    <div class="cfg-field">
      <div class="cfg-label">Clave secreta (YARVIS_SECRET)</div>
      <input class="cfg-input" id="cfgSecret" type="password" placeholder="tu-clave-secreta">
    </div>
    <button class="cfg-save" onclick="saveConfig()">// Guardar y conectar</button>
  </div>
</div>

<script>
const SESSION = 'y-' + (localStorage.getItem('ysid') || (() => { const s = Math.random().toString(36).slice(2,8); localStorage.setItem('ysid',s); return s; })());
let serverUrl  = localStorage.getItem('yarvis_url') || '';
let secret     = localStorage.getItem('yarvis_secret') || '';
let processing = false;
let macOnline  = false;

// ── Voz tipo Jarvis ────────────────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const clean = text.replace(/[*_`#]/g,'').slice(0,400);
  const utt = new SpeechSynthesisUtterance(clean);
  const voices = speechSynthesis.getVoices();

  // Prioridad: voz masculina en español → inglés UK (Daniel/Alex) → cualquiera
  const pref = [
    v => v.lang.startsWith('es') && /male|jorge|pablo|diego/i.test(v.name),
    v => v.lang.startsWith('es'),
    v => v.lang === 'en-GB' && /daniel|oliver/i.test(v.name),
    v => v.lang === 'en-GB',
    v => /daniel|alex|fred/i.test(v.name),
  ];
  for (const fn of pref) {
    const v = voices.find(fn);
    if (v) { utt.voice = v; break; }
  }

  utt.lang   = 'es-ES';
  utt.pitch  = 0.75;   // más grave
  utt.rate   = 0.92;   // ligeramente más lento
  utt.volume = 1;
  speechSynthesis.speak(utt);
}

// ── Speech Recognition ────────────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec      = null;
let wakeOn   = false;
let cmdMode  = false;
let cmdTimer = null;
const WAKE   = ['yarvis','jarvis','yarbi','jarbi','iarbis'];

function startListening() {
  if (!SR) { setLbl('Sin soporte de voz — usa texto'); return; }
  stopRec();
  rec = new SR();
  rec.lang = 'es-ES';
  rec.continuous = true;
  rec.interimResults = true;

  rec.onstart = () => { wakeOn = true; setOrb('wake'); setLbl('Escuchando — di "Yarvis"','active'); };

  rec.onresult = (e) => {
    let fin = '', int = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? fin += t : int += t;
    }
    const txt = (fin || int).toLowerCase().trim();

    if (!cmdMode) {
      if (WAKE.some(w => txt.includes(w))) {
        cmdMode = true;
        setOrb('cmd');
        setLbl('Escuchando orden…','cmd');
        speak('Dime');
        cmdTimer && clearTimeout(cmdTimer);
      }
    } else {
      let clean = txt;
      WAKE.forEach(w => { clean = clean.replace(new RegExp(w,'gi'),'').trim(); });
      if (fin && clean.length > 1) {
        cmdTimer && clearTimeout(cmdTimer);
        const captured = clean;
        cmdTimer = setTimeout(() => {
          if (!processing) {
            cmdMode = false;
            setOrb('wake');
            setLbl('Escuchando — di "Yarvis"','active');
            sendMessage(captured);
          }
        }, 1100);
      }
    }
  };

  rec.onerror = (e) => {
    if (e.error === 'not-allowed') { stopRec(); setLbl('Permiso de micrófono denegado'); return; }
    if (wakeOn) setTimeout(startListening, 800);
  };

  rec.onend = () => { if (wakeOn) setTimeout(startListening, 300); };

  try { rec.start(); } catch(e) { setTimeout(startListening, 500); }
}

function stopRec() {
  wakeOn = false; cmdMode = false;
  try { rec && rec.stop(); } catch(e){}
  rec = null;
}

function orbClick() {
  if (!serverUrl) { openCfg(); return; }
  if (wakeOn) { stopRec(); setOrb(''); setLbl('Toca para activar'); }
  else startListening();
}

// ── Enviar mensaje ────────────────────────────────────────────────────────────
async function sendText() {
  const inp = document.getElementById('txtIn');
  const t = inp.value.trim();
  if (!t || processing) return;
  inp.value = '';
  sendMessage(t);
}

async function sendMessage(text) {
  if (!serverUrl) { openCfg(); return; }
  if (processing) return;
  processing = true;
  addMsg('user', text);
  setLbl('Procesando…');
  const tid = addThinking();

  try {
    const res = await fetch(serverUrl.replace(/\/$/,'') + '/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message:text, session_id:SESSION, secret})
    });
    removeThinking(tid);

    if (!res.ok) {
      const err = await res.json().catch(()=>({detail:res.statusText}));
      if (res.status === 401) { openCfg(); return; }
      addMsg('bot','Error: ' + (err.detail || res.statusText));
      return;
    }
    const data = await res.json();
    addMsg('bot', data.reply, data.actions||[]);
    updateMac(data.mac_online);
    speak(data.reply);

  } catch(e) {
    removeThinking(tid);
    addMsg('bot','No puedo conectar con el servidor. Verifica la URL en configuración.');
  } finally {
    processing = false;
    if (wakeOn) setLbl('Escuchando — di "Yarvis"','active');
    else setLbl('Toca para activar');
  }
}

// ── UI ────────────────────────────────────────────────────────────────────────
function addMsg(role, text, actions=[]) {
  const div = document.getElementById('msgs');
  const w = document.createElement('div');
  w.className = 'msg ' + (role==='user'?'user':'bot');
  if (role==='bot') {
    const r = document.createElement('div'); r.className='role'; r.textContent='Yarvis';
    w.appendChild(r);
  }
  const b = document.createElement('div'); b.className='bubble'; b.textContent=text;
  w.appendChild(b);
  actions.forEach(a=>{
    const t=document.createElement('div'); t.className='action-tag';
    t.textContent=({url:'[URL]',cmd:'[CMD]',app:'[APP]'}[a.type]||'[ACT]')+' '+a.value;
    w.appendChild(t);
  });
  div.appendChild(w); div.scrollTop=div.scrollHeight;
}

function addThinking() {
  const id='think-'+Date.now();
  const div=document.getElementById('msgs');
  const w=document.createElement('div');
  w.className='msg bot thinking'; w.id=id;
  w.innerHTML='<div class="bubble"><span></span><span></span><span></span></div>';
  div.appendChild(w); div.scrollTop=div.scrollHeight;
  return id;
}
function removeThinking(id){document.getElementById(id)?.remove();}

function setOrb(state) {
  document.getElementById('orb').className='orb-outer'+(state?' '+state:'');
}
function setLbl(t,cls='') {
  const el=document.getElementById('stateLbl');
  el.textContent=t; el.className='state-lbl'+(cls?' '+cls:'');
}
function updateMac(on) {
  macOnline=on;
  document.getElementById('macBadge').className='mac-badge'+(on?' online':'');
  document.getElementById('macDot').className='dot'+(on?' online':'');
  document.getElementById('macLabel').textContent=on?'Mac online':'Mac offline';
}

// ── Config ────────────────────────────────────────────────────────────────────
function openCfg(){
  document.getElementById('cfgUrl').value=serverUrl;
  document.getElementById('cfgSecret').value=secret;
  document.getElementById('cfgOverlay').classList.add('open');
}
function closeCfg(){document.getElementById('cfgOverlay').classList.remove('open');}
function saveConfig(){
  serverUrl=document.getElementById('cfgUrl').value.trim();
  secret=document.getElementById('cfgSecret').value.trim();
  localStorage.setItem('yarvis_url',serverUrl);
  localStorage.setItem('yarvis_secret',secret);
  closeCfg();
  addMsg('bot','Sistema configurado. Toca el orb para activar escucha de voz.');
  checkStatus();
}
document.getElementById('cfgOverlay').addEventListener('click',function(e){if(e.target===this)closeCfg();});

async function checkStatus(){
  if(!serverUrl)return;
  try{const r=await fetch(serverUrl.replace(/\/$/,'')+'/api/status');
    if(r.ok){const d=await r.json();updateMac(d.mac_online);}}catch(e){}
}

if(window.speechSynthesis){
  speechSynthesis.getVoices();
  speechSynthesis.addEventListener('voiceschanged',()=>{},{once:true});
}
if(!serverUrl)setTimeout(openCfg,700);
else checkStatus();
setInterval(checkStatus,30000);
</script>
</body>
</html>
